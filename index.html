<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Management System</title>
    <style>
        /* Base Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f8f9fa;
            color: #333;
            display: flex;
            min-height: 100vh;
        }

        /* Dashboard Layout */
        .app-container {
            display: flex;
            width: 100%;
        }

        /* Sidebar Styling */
        .sidebar {
            width: 260px;
            background-color: #1e293b;
            color: #fff;
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .sidebar h2 {
            font-size: 20px;
            margin-bottom: 10px;
            color: #38bdf8;
        }

        .action-btn {
            background-color: #3b82f6;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
            text-align: center;
        }

        .action-btn:hover {
            background-color: #2563eb;
        }

        .upload-label {
            background-color: #10b981;
            color: white;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            text-align: center;
            display: block;
            transition: background 0.2s;
        }

        .upload-label:hover {
            background-color: #059669;
        }

        #fileInput {
            display: none;
        }

        /* Main Content Explorer Area */
        .main-content {
            flex-1: 1;
            width: 100%;
            padding: 40px;
        }

        .header {
            margin-bottom: 30px;
        }

        /* Grid Layout for Files/Folders */
        .file-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }

        /* Individual Item Card */
        .file-item {
            background: white;
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            position: relative;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .item-icon {
            font-size: 40px;
            margin-bottom: 10px;
        }

        .item-name {
            font-weight: 600;
            font-size: 14px;
            color: #1e293b;
            word-break: break-all;
            margin-bottom: 5px;
        }

        .item-meta {
            font-size: 12px;
            color: #64748b;
        }

        .delete-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: none;
            border: none;
            color: #ef4444;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
        }

        /* Responsive Breakpoints */
        @media (max-width: 768px) {
            .app-container {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
                padding: 20px;
            }
            .main-content {
                padding: 20px;
            }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <aside class="sidebar">
            <h2>Cloud Drive</h2>
            <button class="action-btn" id="newFolderBtn">+ New Folder</button>
            
            <label for="fileInput" class="upload-label">↑ Upload File</label>
            <input type="file" id="fileInput" multiple>
        </aside>

        <main class="main-content">
            <div class="header">
                <h1>My Files</h1>
            </div>

            <div class="file-grid" id="fileGrid">
                </div>
        </main>
    </div>

    <script src="manager.js"></script>
</body>
</html>
